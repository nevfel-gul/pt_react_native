workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2 
    environment:
      node: latest
      xcode: latest 
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/athletrack.xcworkspace" # .xcworkspace dosyanın yolu
        XCODE_SCHEME: "AthleTrack" # Xcode'daki Scheme adın
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.athletrack.athletrack" --project-id "6757720700" --type IOS_APP_STORE --install
          target-codesigning-status
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - nevfel.business@gmail.com